; Uploads de releases (ZIP + SQL) no portal
upload_max_filesize = 512M
post_max_size = 520M
max_file_uploads = 20
max_execution_time = 600
max_input_time = 600
memory_limit = 512M
; Sessões do portal (cliente + admin) — alinhado a SESSION_LIFETIME_DAYS=30
session.gc_maxlifetime = 2592000
session.cookie_lifetime = 2592000
